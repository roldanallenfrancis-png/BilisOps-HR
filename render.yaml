# Render Blueprint — deploys all three sites as separate static services:
#   bilisops-landing → hr.bilisops.com     (marketing + register)
#   bilisops-app     → app.bilisops.com    (login + dashboard)
#   bilisops-admin   → admin.bilisops.com  (registrations backoffice)
# Custom domains: add each in the service's Settings → Custom Domains, then
# create the CNAME records Render shows you in Hostinger's DNS zone editor.
services:
  - type: web
    name: bilisops-landing
    runtime: static
    buildCommand: npm ci && npm run build:landing
    staticPublishPath: dist-landing
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

  - type: web
    name: bilisops-app
    runtime: static
    buildCommand: npm ci && npm run build:app
    staticPublishPath: dist-app
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_SUPABASE_URL
        sync: false
      - key: VITE_SUPABASE_ANON_KEY
        sync: false

  - type: web
    name: bilisops-admin
    runtime: static
    domains:
      - admin.bilisops.com
    buildCommand: npm ci && npm run build:admin
    staticPublishPath: dist-admin
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_SUPABASE_URL
        sync: false
      - key: VITE_SUPABASE_ANON_KEY
        sync: false
